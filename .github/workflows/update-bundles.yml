name: Update Stremio Bundles

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-bundles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        working-directory: website
        run: node scripts/scrape-all-shows.js

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update stremio filler bundles"
          branch: chore/update-stremio-bundles
          delete-branch: true
          title: "chore: update stremio filler bundles"
          body: "Automated weekly update of `completedAnime.json` and `showList.json`."
          add-paths: |
            website/api/stremio/lib/completedAnime.json
            website/api/stremio/lib/showList.json
