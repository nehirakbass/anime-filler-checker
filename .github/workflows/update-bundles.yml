name: Update Stremio Bundles

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-bundles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        working-directory: website
        run: node scripts/scrape-all-shows.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet website/api/stremio/lib/completedAnime.json website/api/stremio/lib/showList.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/api/stremio/lib/completedAnime.json website/api/stremio/lib/showList.json
          git commit -m "chore: update stremio filler bundles [skip ci]"
          git push
